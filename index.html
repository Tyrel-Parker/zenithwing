<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZENITHWING</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:  #04040e;
    --cyan:   #00FFFF;
    --yellow: #FFD700;
    --red:    #FF3333;
    --green:  #00FF88;
    --dim:    #223344;
    --white:  #FFFFFF;
  }

  html, body {
    background: var(--black);
    color: var(--white);
    font-family: 'Press Start 2P', monospace;
    height: 100%;
    overflow: hidden;
    touch-action: none;
  }

  #shell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 6px;
    padding: 6px;
  }

  #title {
    font-size: clamp(9px, 2.8vw, 15px);
    color: var(--cyan);
    letter-spacing: 5px;
    text-shadow: 0 0 18px var(--cyan);
  }

  #hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 480px;
    font-size: clamp(6px, 1.7vw, 9px);
    padding: 0 4px;
    gap: 6px;
  }

  #score-block { color: var(--yellow); }
  #wave-block  { color: var(--cyan); }
  #lives-block { color: var(--red); }

  #mode-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(5px, 1.2vw, 8px);
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--dim);
    padding: 4px 7px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  #mode-btn:hover { color: var(--cyan); border-color: var(--cyan); }
  #mode-btn.tilt-active { color: var(--yellow); border-color: var(--yellow); }

  canvas {
    display: block;
    image-rendering: pixelated;
    max-width: 100%;
    max-height: calc(100vh - 88px);
  }

  #message {
    font-size: clamp(7px, 2.2vw, 12px);
    color: var(--cyan);
    text-align: center;
    letter-spacing: 2px;
    min-height: 18px;
    text-shadow: 0 0 10px var(--cyan);
  }

  #tilt-indicator {
    font-size: clamp(5px, 1.1vw, 7px);
    color: var(--dim);
    letter-spacing: 1px;
    min-height: 12px;
  }

  #error-log {
    font-family: monospace;
    font-size: 9px;
    color: #ff4444;
    background: #1a0000;
    padding: 3px 8px;
    max-width: 480px;
    width: 100%;
    word-break: break-all;
    display: none;
    max-height: 60px;
    overflow-y: auto;
  }

  #version-num {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: #1a2233;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="shell">
  <div id="title">ZENITHWING</div>
  <div id="hud">
    <span id="score-block">SCORE: <span id="score-val">0</span></span>
    <button id="mode-btn">⌨ KEYS</button>
    <span id="wave-block">WAVE <span id="wave-val">1</span></span>
    <span id="lives-block">♥ <span id="lives-val">3</span></span>
  </div>
  <canvas id="c"></canvas>
  <div id="message"></div>
  <div id="tilt-indicator"></div>
  <div id="error-log"></div>
  <div id="version-num">v1.0</div>
</div>

<script>
// ─── ERROR LOG ───────────────────────────────────────────────────────────────
const errorLog = document.getElementById('error-log');
function logError(msg) {
  errorLog.style.display = 'block';
  errorLog.textContent += msg + '\n';
}
window.addEventListener('error', e => logError('ERR: ' + e.message + ' (L' + e.lineno + ')'));
window.addEventListener('unhandledrejection', e => logError('REJ: ' + e.reason));

// ─── CANVAS ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CW = 320, CH = 480;
canvas.width = CW;
canvas.height = CH;

function resizeCanvas() {
  const maxW = window.innerWidth - 12;
  const maxH = window.innerHeight - 88;
  const scale = Math.min(maxW / CW, maxH / CH, 2);
  canvas.style.width  = (CW * scale) + 'px';
  canvas.style.height = (CH * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const PLAYER_SPEED    = 5;
const BULLET_SPEED    = 8;
const EBULLET_SPEED   = 2.8;
const MAX_LIVES       = 3;
const KILLS_PER_WAVE  = 18;

// ─── GAME STATE ──────────────────────────────────────────────────────────────
// 'highscore' | 'nameentry' | 'playing' | 'gameover'
let gameState = 'highscore';
let score = 0, lives = MAX_LIVES, wave = 1, waveKills = 0;
let fireTimer = 0, spawnTimer = 0, screenShake = 0;
let lastScore = 0, messageTimer = null;

// ─── LEADERBOARD ─────────────────────────────────────────────────────────────
let leaderboard = JSON.parse(localStorage.getItem('zenithwing-lb') || '[]');
const NAME_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ ';
let nameChars = ['A','A','A'], nameCursor = 0;

function qualifiesForLB(s) {
  return s > 0 && (leaderboard.length < 10 || s > leaderboard[leaderboard.length - 1].score);
}
function addToLB(name, s) {
  leaderboard.push({ name, score: s });
  leaderboard.sort((a, b) => b.score - a.score);
  if (leaderboard.length > 10) leaderboard.length = 10;
  localStorage.setItem('zenithwing-lb', JSON.stringify(leaderboard));
}
function cycleNameChar(dir) {
  const i = NAME_CHARS.indexOf(nameChars[nameCursor]);
  nameChars[nameCursor] = NAME_CHARS[(i + dir + NAME_CHARS.length) % NAME_CHARS.length];
}
function advanceNameCursor(dir) {
  if (dir > 0 && nameCursor === 2) { confirmName(); return; }
  nameCursor = Math.max(0, Math.min(2, nameCursor + dir));
}
function confirmName() {
  addToLB(nameChars.join('').trimEnd() || '???', lastScore);
  gameState = 'highscore';
}

// ─── STARS (two-layer parallax) ──────────────────────────────────────────────
let stars = [];
function initStars() {
  stars = Array.from({ length: 110 }, () => ({
    x: Math.random() * CW,
    y: Math.random() * CH,
    speed: 0.4 + Math.random() * 2.2,
    size:  Math.random() < 0.07 ? 2 : 1,
    alpha: 0.25 + Math.random() * 0.75,
  }));
}
function updateStars() {
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > CH) { s.y = -2; s.x = Math.random() * CW; }
  }
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
const player = {
  x: CW / 2, y: CH - 72,
  hw: 14, hh: 14,           // hitbox half-extents
  powerLevel: 1,
  shield: false,
  rapidFire: false, rapidTimer: 0,
  invincible: false, invincTimer: 0,
  thrustAnim: 0,
  alive: true,
};

function resetPlayer() {
  player.x = CW / 2; player.y = CH - 72;
  player.powerLevel = 1;
  player.shield = false;
  player.rapidFire = false; player.rapidTimer = 0;
  player.invincible = false; player.invincTimer = 0;
  player.alive = true;
}

// ─── ENTITY ARRAYS ───────────────────────────────────────────────────────────
let bullets = [];       // { x, y, vx, vy }
let ebullets = [];      // enemy bullets
let enemies = [];
let powerups = [];
let particles = [];

// ─── ENEMY DEFINITIONS ───────────────────────────────────────────────────────
// type 0 = Scout   (small, fast, 1 hp, straight / zigzag)
// type 1 = Fighter (medium, 2 hp, zigzag, fires often)
// type 2 = Bomber  (large, 5 hp, aims at player, heavy shots)
const EDEFS = [
  { hw: 8,  hh: 8,  baseHp: 1, pts: 100, color: '#FF4455', fireRate: 180, dropChance: 0.12 },
  { hw: 11, hh: 9,  baseHp: 2, pts: 250, color: '#FF8800', fireRate: 110, dropChance: 0.22 },
  { hw: 14, hh: 11, baseHp: 5, pts: 600, color: '#CC44FF', fireRate: 70,  dropChance: 0.55 },
];

// ─── POWERUP COLORS / LABELS ─────────────────────────────────────────────────
const PU_COLOR = { power: '#00FF88', shield: '#88BBFF', rapid: '#FFD700', bomb: '#FF6600' };
const PU_LABEL = { power: 'P',       shield: 'S',       rapid: 'R',       bomb: 'B' };

// ─── PARTICLES ───────────────────────────────────────────────────────────────
function spawnExplosion(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 0.6 + Math.random() * 3;
    const life = 18 + Math.random() * 22;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
                     life, maxLife: life, color, size: 1.5 + Math.random()*2.5 });
  }
}
function spawnHitSpark(x, y) {
  for (let i = 0; i < 5; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 2;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
                     life: 10, maxLife: 10, color: '#FFEE44', size: 1.5 });
  }
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let controlMode = isMobile ? 'touch' : 'keys';

const keysDown = {};

// Tilt state
let tiltPermissionGranted = false;
let tiltEventReceived = false, tiltCheckTimer = null;
let tiltGamma = 0, tiltBeta = 45;
const tiltIndicator = document.getElementById('tilt-indicator');

async function requestTiltPermission() {
  if (typeof DeviceOrientationEvent === 'undefined') return false;
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const r = await DeviceOrientationEvent.requestPermission();
      return r === 'granted';
    } catch { return false; }
  }
  return true;
}

function handleOrientation(e) {
  if (controlMode !== 'tilt') return;
  tiltEventReceived = true;
  tiltBeta  = e.beta  ?? 45;
  tiltGamma = e.gamma ?? 0;
  tiltIndicator.textContent = `b${tiltBeta.toFixed(0)} g${tiltGamma.toFixed(0)}`;
}
window.addEventListener('deviceorientation', handleOrientation);
window.addEventListener('deviceorientationabsolute', handleOrientation);

// Mode button
const modeBtn = document.getElementById('mode-btn');
const MODES = isMobile ? ['touch', 'tilt'] : ['keys', 'tilt'];
const MODE_LABELS = { keys: '⌨ KEYS', touch: '👆 TOUCH', tilt: '📱 TILT' };
modeBtn.textContent = MODE_LABELS[controlMode];

modeBtn.addEventListener('click', async () => {
  const next = MODES[(MODES.indexOf(controlMode) + 1) % MODES.length];
  if (next === 'tilt' && !tiltPermissionGranted) {
    tiltPermissionGranted = await requestTiltPermission();
    if (!tiltPermissionGranted) { showMessage('TILT NOT AVAILABLE', 2000); return; }
  }
  controlMode = next;
  modeBtn.textContent = MODE_LABELS[controlMode];
  modeBtn.classList.toggle('tilt-active', controlMode === 'tilt');
  tiltIndicator.textContent = controlMode === 'tilt' ? 'TILT ACTIVE' : '';
  clearTimeout(tiltCheckTimer);
  if (controlMode === 'tilt') {
    tiltEventReceived = false;
    tiltCheckTimer = setTimeout(() => {
      if (controlMode === 'tilt' && !tiltEventReceived)
        tiltIndicator.textContent = 'TILT BLOCKED – CHECK BROWSER';
    }, 2000);
  }
});

// Touch drag state
let activeTouchId = null, touchCanvasX = 0, touchCanvasY = 0;

function clientToCanvas(cx, cy) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (cx - r.left) * (CW / r.width),
    y: (cy - r.top)  * (CH / r.height),
  };
}

// Single touchstart handler
document.addEventListener('touchstart', e => {
  if (e.target === modeBtn) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  if (activeTouchId === null) {
    activeTouchId = t.identifier;
    const p = clientToCanvas(t.clientX, t.clientY);
    touchCanvasX = p.x; touchCanvasY = p.y;
  }
}, { passive: false });

document.addEventListener('touchmove', e => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (t.identifier === activeTouchId) {
      const p = clientToCanvas(t.clientX, t.clientY);
      touchCanvasX = p.x; touchCanvasY = p.y;
    }
  }
}, { passive: false });

let tapStartX = 0, tapStartY = 0, tapStartClient = null;
document.addEventListener('touchstart', e => {
  if (e.target === modeBtn) return;
  tapStartClient = { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
}, { passive: false, capture: true });

document.addEventListener('touchend', e => {
  if (e.target === modeBtn) return;
  e.preventDefault();

  const t = e.changedTouches[0];
  if (t.identifier === activeTouchId) activeTouchId = null;

  if (!tapStartClient) return;
  const dx = t.clientX - tapStartClient.x;
  const dy = t.clientY - tapStartClient.y;
  tapStartClient = null;

  if (gameState === 'nameentry') {
    if (Math.abs(dx) < 12 && Math.abs(dy) < 12) {
      advanceNameCursor(1);
    } else if (Math.abs(dy) > Math.abs(dx)) {
      cycleNameChar(dy > 0 ? 1 : -1);
    } else {
      advanceNameCursor(dx > 0 ? 1 : -1);
    }
    return;
  }

  if (Math.abs(dx) < 15 && Math.abs(dy) < 15) handleStart();
}, { passive: false });

// Keyboard
document.addEventListener('keydown', e => {
  keysDown[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); handleStart(); }
  if (gameState === 'nameentry') {
    e.preventDefault();
    if (e.code === 'ArrowUp'   || e.code === 'KeyW') cycleNameChar(-1);
    if (e.code === 'ArrowDown' || e.code === 'KeyS') cycleNameChar(1);
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') advanceNameCursor(-1);
    if (e.code === 'ArrowRight'|| e.code === 'KeyD') advanceNameCursor(1);
    if (e.code === 'Enter') confirmName();
  }
  // Prevent arrow-key page scroll during play
  if (gameState === 'playing' && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))
    e.preventDefault();
});
document.addEventListener('keyup', e => { keysDown[e.code] = false; });

// ─── INPUT → PLAYER VELOCITY ─────────────────────────────────────────────────
function tiltAxis(raw, dead = 8, max = 34) {
  const s = Math.sign(raw);
  return s * Math.min(Math.max(0, Math.abs(raw) - dead) / max, 1);
}

function applyInput() {
  if (!player.alive) return;
  let vx = 0, vy = 0;

  if (controlMode === 'tilt') {
    vx = tiltAxis(tiltGamma);
    vy = tiltAxis(tiltBeta - 45);  // 45° = typical upright phone angle = neutral
  } else if (controlMode === 'keys') {
    if (keysDown['ArrowLeft']  || keysDown['KeyA']) vx = -1;
    if (keysDown['ArrowRight'] || keysDown['KeyD']) vx =  1;
    if (keysDown['ArrowUp']    || keysDown['KeyW']) vy = -1;
    if (keysDown['ArrowDown']  || keysDown['KeyS']) vy =  1;
    if (vx !== 0 && vy !== 0) { vx *= 0.707; vy *= 0.707; }
  } else if (controlMode === 'touch' && activeTouchId !== null) {
    const dx = touchCanvasX - player.x;
    const dy = touchCanvasY - player.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 8) {
      const speed = Math.min(dist * 0.18, PLAYER_SPEED);
      player.x += (dx / dist) * speed;
      player.y += (dy / dist) * speed;
      player.x = Math.max(16, Math.min(CW - 16, player.x));
      player.y = Math.max(28, Math.min(CH - 28, player.y));
      return;
    }
  }

  player.x += vx * PLAYER_SPEED;
  player.y += vy * PLAYER_SPEED;
  player.x = Math.max(16, Math.min(CW - 16, player.x));
  player.y = Math.max(28, Math.min(CH - 28, player.y));
}

// ─── AUTO-FIRE ───────────────────────────────────────────────────────────────
// Spread patterns: [vx, vy] per bullet, indexed by powerLevel-1
const FIRE_PATTERNS = [
  [[0, -BULLET_SPEED]],
  [[-1.5, -BULLET_SPEED * 0.98], [1.5, -BULLET_SPEED * 0.98]],
  [[-2.8, -BULLET_SPEED * 0.95], [0, -BULLET_SPEED], [2.8, -BULLET_SPEED * 0.95]],
  [[-4, -BULLET_SPEED * 0.9], [-1.3, -BULLET_SPEED], [1.3, -BULLET_SPEED], [4, -BULLET_SPEED * 0.9]],
  [[-4.5, -BULLET_SPEED * 0.85], [-2, -BULLET_SPEED * 0.97], [0, -BULLET_SPEED],
   [2, -BULLET_SPEED * 0.97], [4.5, -BULLET_SPEED * 0.85]],
];

function fireStep() {
  if (fireTimer > 0) { fireTimer--; return; }
  fireTimer = player.rapidFire ? 5 : 13;
  const pat = FIRE_PATTERNS[Math.min(player.powerLevel - 1, 4)];
  for (const [vx, vy] of pat)
    bullets.push({ x: player.x, y: player.y - 18, vx, vy });
}

// ─── ENEMY SPAWNING ──────────────────────────────────────────────────────────
function currentSpawnRate() {
  return Math.max(28, 78 - wave * 3);
}

function waveTypeWeights() {
  if (wave <= 2)      return [1,   0,    0];
  if (wave <= 4)      return [0.6, 0.35, 0.05];
  if (wave <= 7)      return [0.4, 0.42, 0.18];
  return               [0.3, 0.4,  0.3];
}

function pickType() {
  const [w0, w1] = waveTypeWeights();
  const r = Math.random();
  return r < w0 ? 0 : r < w0 + w1 ? 1 : 2;
}

function spawnEnemy() {
  const type = pickType();
  const def  = EDEFS[type];
  const x    = def.hw + 4 + Math.random() * (CW - def.hw * 2 - 8);
  const patterns = type === 0 ? ['straight', 'zigzag'] :
                   type === 1 ? ['zigzag', 'swoop']    : ['aim'];
  const pattern = patterns[Math.floor(Math.random() * patterns.length)];
  const hpBonus = Math.floor((wave - 1) * 0.35);

  enemies.push({
    x, y: -(def.hh + 4), startX: x, t: 0,
    type, pattern, def,
    hp: def.baseHp + hpBonus,
    maxHp: def.baseHp + hpBonus,
    speed: (1.0 + (wave - 1) * 0.08) * (type === 0 ? 1.6 : type === 1 ? 1.1 : 0.75),
    fireTimer: 20 + Math.floor(Math.random() * 40),
    fireRate:  Math.max(38, def.fireRate - wave * 5),
  });
}

function updateEnemies() {
  spawnTimer++;
  if (spawnTimer >= currentSpawnRate()) {
    spawnTimer = 0;
    spawnEnemy();
    if (Math.random() < 0.18 + wave * 0.01) {
      setTimeout(() => { if (gameState === 'playing') spawnEnemy(); }, 250);
    }
  }

  const alive = [];
  for (const e of enemies) {
    e.t++;
    const { type, pattern, speed, def } = e;

    // Movement
    if (pattern === 'straight') {
      e.y += speed;
    } else if (pattern === 'zigzag') {
      e.y += speed;
      e.x = e.startX + Math.sin(e.t * 0.045) * 55;
    } else if (pattern === 'swoop') {
      e.y += speed;
      e.x = e.startX + Math.sin(e.t * 0.03) * 80;
    } else { // aim
      const dx = player.x - e.x, dy = player.y - e.y;
      const d = Math.hypot(dx, dy) || 1;
      e.x += (dx / d) * speed * 0.45;
      e.y += speed * 0.9 + (dy / d) * speed * 0.3;
    }

    // Fire
    if (player.alive) {
      e.fireTimer--;
      if (e.fireTimer <= 0) {
        e.fireTimer = e.fireRate;
        const dx = player.x - e.x, dy = player.y - e.y;
        const d = Math.hypot(dx, dy) || 1;
        const spd = EBULLET_SPEED * (1 + wave * 0.04);
        ebullets.push({ x: e.x, y: e.y + def.hh, vx: (dx/d)*spd, vy: (dy/d)*spd });
      }
    }

    if (e.y < CH + 60) alive.push(e);
  }
  enemies = alive;
}

// ─── BULLET UPDATE ───────────────────────────────────────────────────────────
function updateBullets() {
  bullets  = bullets.filter(b => { b.x += b.vx; b.y += b.vy; return b.y > -10 && b.y < CH + 10; });
  ebullets = ebullets.filter(b => { b.x += b.vx; b.y += b.vy;
    return b.y < CH + 10 && b.y > -10 && b.x > -10 && b.x < CW + 10; });
}

// ─── POWERUP UPDATE ──────────────────────────────────────────────────────────
function updatePowerups() {
  powerups = powerups.filter(p => { p.y += 1.4; p.t++; return p.y < CH + 20; });
}

function spawnPowerup(x, y) {
  const pool = ['power','power','power','shield','rapid','bomb'];
  const type = pool[Math.floor(Math.random() * pool.length)];
  powerups.push({ x, y, type, t: 0 });
}

// ─── COLLISION DETECTION ─────────────────────────────────────────────────────
function boxHit(ax, ay, ahw, ahh, bx, by, bhw, bhh) {
  return Math.abs(ax - bx) < ahw + bhw && Math.abs(ay - by) < ahh + bhh;
}

function checkCollisions() {
  if (!player.alive) return;

  // Player bullets vs enemies
  const aliveBullets = [];
  for (const b of bullets) {
    let hit = false;
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      if (boxHit(b.x, b.y, 2, 5, e.x, e.y, e.def.hw, e.def.hh)) {
        spawnHitSpark(b.x, b.y);
        e.hp--;
        hit = true;
        if (e.hp <= 0) {
          spawnExplosion(e.x, e.y, e.def.color, 14);
          score += e.def.pts * wave;
          waveKills++;
          if (waveKills >= KILLS_PER_WAVE + wave * 2) {
            wave++;
            waveKills = 0;
            updateHUD();
            showMessage('WAVE ' + wave + '!', 1200);
          }
          updateHUD();
          if (Math.random() < e.def.dropChance) spawnPowerup(e.x, e.y);
          enemies.splice(i, 1);
          i--;
        }
        break;
      }
    }
    if (!hit) aliveBullets.push(b);
  }
  bullets = aliveBullets;

  // Enemy bullets vs player
  if (!player.invincible) {
    const aliveEB = [];
    for (const b of ebullets) {
      if (boxHit(b.x, b.y, 4, 4, player.x, player.y, player.hw * 0.75, player.hh * 0.75)) {
        hitPlayer();
      } else {
        aliveEB.push(b);
      }
    }
    ebullets = aliveEB;
  }

  // Enemies ramming player
  if (!player.invincible) {
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (boxHit(e.x, e.y, e.def.hw, e.def.hh, player.x, player.y, player.hw * 0.8, player.hh * 0.8)) {
        spawnExplosion(e.x, e.y, e.def.color, 10);
        enemies.splice(i, 1);
        hitPlayer();
      }
    }
  }

  // Powerups vs player
  const alivePU = [];
  for (const p of powerups) {
    if (boxHit(p.x, p.y, 10, 10, player.x, player.y, player.hw + 6, player.hh + 6)) {
      collectPowerup(p.type);
    } else {
      alivePU.push(p);
    }
  }
  powerups = alivePU;
}

function hitPlayer() {
  if (player.shield) {
    player.shield = false;
    player.invincible = true; player.invincTimer = 90;
    screenShake = 6;
    spawnExplosion(player.x, player.y, '#88BBFF', 8);
    return;
  }
  lives--;
  screenShake = 14;
  spawnExplosion(player.x, player.y, '#FF4455', 18);
  updateHUD();
  if (lives <= 0) {
    player.alive = false;
    lastScore = score;
    gameState = 'gameover';
    showMessage('GAME OVER');
    setTimeout(() => {
      showMessage('');
      if (qualifiesForLB(lastScore)) {
        nameChars = ['A','A','A']; nameCursor = 0;
        gameState = 'nameentry';
      } else {
        gameState = 'highscore';
      }
    }, 2600);
  } else {
    // power penalty: drop one level on each hit
    if (player.powerLevel > 1) player.powerLevel--;
    player.invincible = true; player.invincTimer = 160;
  }
}

function collectPowerup(type) {
  if (type === 'power') {
    if (player.powerLevel < 5) player.powerLevel++;
    spawnExplosion(player.x, player.y - 10, '#00FF88', 7);
  } else if (type === 'shield') {
    player.shield = true;
    spawnExplosion(player.x, player.y, '#88BBFF', 7);
  } else if (type === 'rapid') {
    player.rapidFire = true; player.rapidTimer = 500;
    spawnExplosion(player.x, player.y, '#FFD700', 7);
  } else if (type === 'bomb') {
    for (const e of enemies) { spawnExplosion(e.x, e.y, e.def.color, 10); score += e.def.pts * wave; }
    enemies = []; ebullets = [];
    screenShake = 22;
    updateHUD();
    spawnExplosion(CW/2, CH/2, '#FF6600', 45);
  }
}

// ─── TIMERS ──────────────────────────────────────────────────────────────────
function updateTimers() {
  if (player.invincTimer > 0 && --player.invincTimer === 0) player.invincible = false;
  if (player.rapidTimer  > 0 && --player.rapidTimer  === 0) player.rapidFire  = false;
}

// ─── GAME FLOW ────────────────────────────────────────────────────────────────
function initGame() {
  score = 0; lives = MAX_LIVES; wave = 1; waveKills = 0;
  fireTimer = 0; spawnTimer = 0; screenShake = 0;
  bullets = []; ebullets = []; enemies = []; powerups = []; particles = [];
  resetPlayer();
  updateHUD();
  gameState = 'playing';
  showMessage('');
}

function handleStart() {
  if (gameState === 'highscore') initGame();
  else if (gameState === 'nameentry') advanceNameCursor(1);
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('wave-val').textContent  = wave;
  document.getElementById('lives-val').textContent = lives;
}

function setMessage(t) { document.getElementById('message').textContent = t; }
function showMessage(t, ms = 0) {
  setMessage(t);
  clearTimeout(messageTimer);
  if (ms > 0) messageTimer = setTimeout(() => setMessage(''), ms);
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function drawStars() {
  for (const s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.fillRect(s.x | 0, s.y | 0, s.size, s.size);
  }
}

function drawPlayer() {
  if (!player.alive) return;
  if (player.invincible && Math.floor(Date.now() / 75) % 2 === 0) return;

  const { x, y } = player;
  player.thrustAnim += 0.22;
  ctx.save();

  // Thruster flame — center
  const fl = ctx.createLinearGradient(x, y + 17, x, y + 17 + 16 + Math.sin(player.thrustAnim) * 5);
  fl.addColorStop(0, 'rgba(100,200,255,0.9)');
  fl.addColorStop(0.45,'rgba(255,160,30,0.75)');
  fl.addColorStop(1,   'rgba(255,50,0,0)');
  ctx.fillStyle = fl;
  ctx.beginPath();
  ctx.moveTo(x - 5, y + 15);
  ctx.lineTo(x + 5, y + 15);
  ctx.lineTo(x, y + 34 + Math.sin(player.thrustAnim) * 4);
  ctx.closePath();
  ctx.fill();

  // Wing thrusters
  const sf = ctx.createLinearGradient(0, y + 10, 0, y + 22);
  sf.addColorStop(0, 'rgba(255,160,30,0.55)');
  sf.addColorStop(1, 'rgba(255,50,0,0)');
  ctx.fillStyle = sf;
  for (const ox of [-13, 13]) {
    ctx.beginPath();
    ctx.moveTo(x + ox - 2, y + 10);
    ctx.lineTo(x + ox + 2, y + 10);
    ctx.lineTo(x + ox, y + 22 + Math.sin(player.thrustAnim + 1) * 3);
    ctx.closePath();
    ctx.fill();
  }

  // Wings
  ctx.shadowColor = '#00CCFF';
  ctx.shadowBlur = 14;
  ctx.fillStyle = '#006699';
  // Left wing
  ctx.beginPath();
  ctx.moveTo(x,      y - 16);
  ctx.lineTo(x - 24, y +  8);
  ctx.lineTo(x - 10, y + 15);
  ctx.lineTo(x,      y +  6);
  ctx.closePath();
  ctx.fill();
  // Right wing
  ctx.beginPath();
  ctx.moveTo(x,      y - 16);
  ctx.lineTo(x + 24, y +  8);
  ctx.lineTo(x + 10, y + 15);
  ctx.lineTo(x,      y +  6);
  ctx.closePath();
  ctx.fill();

  // Fuselage
  ctx.fillStyle = '#00AADD';
  ctx.beginPath();
  ctx.moveTo(x,      y - 18);
  ctx.lineTo(x +  6, y +  5);
  ctx.lineTo(x,      y + 13);
  ctx.lineTo(x -  6, y +  5);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#99EEFF';
  ctx.beginPath();
  ctx.ellipse(x, y - 6, 3.5, 6.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Accent stripe
  ctx.fillStyle = '#00FFFF';
  ctx.fillRect(x - 1, y - 15, 2, 12);

  // Shield ring
  if (player.shield) {
    const alpha = 0.45 + 0.3 * Math.sin(Date.now() / 140);
    ctx.strokeStyle = `rgba(136,187,255,${alpha})`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#88BBFF';
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.arc(x, y, 26, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawEnemies() {
  for (const e of enemies) {
    const { x, y, def, hp, maxHp } = e;
    const { hw, hh, color } = def;
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 9;
    ctx.fillStyle = color;

    if (e.type === 0) {
      // Scout: angular diamond
      ctx.beginPath();
      ctx.moveTo(x,       y - hh);
      ctx.lineTo(x + hw,  y + hh * 0.3);
      ctx.lineTo(x,       y + hh);
      ctx.lineTo(x - hw,  y + hh * 0.3);
      ctx.closePath();
      ctx.fill();
      // Engine glow
      ctx.fillStyle = 'rgba(255,100,50,0.7)';
      ctx.beginPath();
      ctx.arc(x, y + hh * 0.6, hw * 0.3, 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type === 1) {
      // Fighter: swept-wing shape
      ctx.beginPath();
      ctx.moveTo(x,          y - hh);
      ctx.lineTo(x + hw*1.6, y + hh * 0.4);
      ctx.lineTo(x + hw*0.5, y + hh);
      ctx.lineTo(x,          y + hh * 0.3);
      ctx.lineTo(x - hw*0.5, y + hh);
      ctx.lineTo(x - hw*1.6, y + hh * 0.4);
      ctx.closePath();
      ctx.fill();
    } else {
      // Bomber: thick elliptical body + broad wings
      ctx.beginPath();
      ctx.ellipse(x, y, hw * 0.55, hh, 0, 0, Math.PI * 2);
      ctx.fill();
      // Left wing
      ctx.beginPath();
      ctx.moveTo(x - hw * 0.5, y - hh * 0.2);
      ctx.lineTo(x - hw * 2.0, y + hh * 0.7);
      ctx.lineTo(x - hw * 0.5, y + hh * 0.5);
      ctx.closePath();
      ctx.fill();
      // Right wing
      ctx.beginPath();
      ctx.moveTo(x + hw * 0.5, y - hh * 0.2);
      ctx.lineTo(x + hw * 2.0, y + hh * 0.7);
      ctx.lineTo(x + hw * 0.5, y + hh * 0.5);
      ctx.closePath();
      ctx.fill();
    }

    // HP bar for multi-HP enemies
    if (maxHp > 1) {
      const bw = hw * 2 + 4;
      const pct = hp / maxHp;
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#222';
      ctx.fillRect(x - bw/2, y + hh + 3, bw, 3);
      ctx.fillStyle = pct > 0.5 ? '#00FF44' : pct > 0.25 ? '#FFAA00' : '#FF2200';
      ctx.fillRect(x - bw/2, y + hh + 3, bw * pct, 3);
    }

    ctx.restore();
  }
}

function drawBullets() {
  ctx.save();
  ctx.shadowColor = '#00FFFF';
  ctx.shadowBlur = 9;
  ctx.fillStyle = '#88FFFF';
  for (const b of bullets) ctx.fillRect(b.x - 1.5, b.y - 5, 3, 10);
  ctx.restore();

  ctx.save();
  ctx.shadowColor = '#FF4455';
  ctx.shadowBlur = 7;
  ctx.fillStyle = '#FF7788';
  for (const b of ebullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawPowerups() {
  for (const p of powerups) {
    const color = PU_COLOR[p.type];
    const alpha = 0.7 + 0.3 * Math.sin(Date.now() / 190 + p.t * 0.1);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = color;
    ctx.shadowBlur = 14;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(p.x - 9, p.y - 9, 18, 18);
    ctx.fillStyle = color;
    ctx.font = '7px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(PU_LABEL[p.type], p.x, p.y + 1);
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.1, p.size * (p.life / p.maxLife)), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawStatusOverlay() {
  if (gameState !== 'playing') return;
  ctx.save();
  ctx.font = '6px "Press Start 2P", monospace';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';

  const pwrColors = ['','#00FF88','#66FF00','#FFD700','#FF8800','#FF44FF'];
  ctx.fillStyle = pwrColors[player.powerLevel] || '#888';
  ctx.fillText('PWR ' + player.powerLevel, 4, 4);

  if (player.rapidFire) {
    ctx.fillStyle = '#FFD700';
    ctx.fillText('RAPID ' + Math.ceil(player.rapidTimer / 60) + 's', 4, 14);
  }
  if (player.shield) {
    ctx.fillStyle = '#88BBFF';
    ctx.fillText('SHIELD', 4, player.rapidFire ? 24 : 14);
  }
  ctx.restore();
}

function drawLeaderboard() {
  const cx = CW / 2;
  ctx.save();
  ctx.fillStyle = 'rgba(2,2,14,0.91)';
  ctx.fillRect(0, 0, CW, CH);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Title
  ctx.shadowColor = '#00FFFF';
  ctx.shadowBlur = 22;
  ctx.fillStyle = '#00FFFF';
  ctx.font = '13px "Press Start 2P", monospace';
  ctx.fillText('ZENITHWING', cx, 26);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#FFD700';
  ctx.font = '8px "Press Start 2P", monospace';
  ctx.fillText('HIGH SCORES', cx, 54);

  if (leaderboard.length === 0) {
    ctx.fillStyle = '#334455';
    ctx.font = '7px "Press Start 2P", monospace';
    ctx.fillText('NO RECORDS YET', cx, 180);
  } else {
    leaderboard.slice(0, 9).forEach((entry, i) => {
      const y = 80 + i * 26;
      const isNew = lastScore > 0 && entry.score === lastScore &&
        i === leaderboard.findIndex(e => e.score === lastScore && e.name === entry.name);
      ctx.font = '7px "Press Start 2P", monospace';
      ctx.fillStyle = isNew ? '#FFD700' : i % 2 === 0 ? '#DDEEFF' : '#7799BB';
      ctx.textAlign = 'left';
      ctx.fillText((i + 1) + '.', 14, y);
      ctx.fillText(entry.name, 46, y);
      ctx.textAlign = 'right';
      ctx.fillText(String(entry.score).padStart(7,'0'), CW - 10, y);
    });
  }

  if (Math.floor(Date.now() / 540) % 2 === 0) {
    ctx.fillStyle = '#00FFFF';
    ctx.font = '7px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(isMobile ? 'TAP TO FLY' : 'SPACE TO FLY', cx, CH - 20);
  }

  ctx.restore();
}

function drawNameEntry() {
  const cx = CW / 2;
  const slotY = 255, slotSpacing = 54;
  ctx.save();
  ctx.fillStyle = 'rgba(2,2,14,0.94)';
  ctx.fillRect(0, 0, CW, CH);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = '#FFD700';
  ctx.font = '9px "Press Start 2P", monospace';
  ctx.fillText('NEW HIGH SCORE!', cx, 66);

  ctx.fillStyle = '#FFFFFF';
  ctx.font = '13px "Press Start 2P", monospace';
  ctx.fillText(String(lastScore).padStart(7,'0'), cx, 100);

  ctx.fillStyle = '#556677';
  ctx.font = '6px "Press Start 2P", monospace';
  ctx.fillText('ENTER YOUR NAME', cx, 162);

  [-1, 0, 1].forEach((offset, i) => {
    const sx = cx + offset * slotSpacing;
    const active = i === nameCursor;
    ctx.fillStyle = active ? '#08082a' : '#050514';
    ctx.fillRect(sx - 19, slotY - 22, 38, 44);
    ctx.strokeStyle = active ? '#FFD700' : '#1a2a3a';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(sx - 19, slotY - 22, 38, 44);
    ctx.fillStyle = active ? '#FFD700' : '#AABBCC';
    ctx.font = '16px "Press Start 2P", monospace';
    ctx.fillText(nameChars[i], sx, slotY);
    const ac = active ? '#FFD700' : '#1a2a3a';
    ctx.fillStyle = ac;
    ctx.beginPath(); ctx.moveTo(sx, slotY-36); ctx.lineTo(sx-7,slotY-28); ctx.lineTo(sx+7,slotY-28); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(sx, slotY+36); ctx.lineTo(sx-7,slotY+28); ctx.lineTo(sx+7,slotY+28); ctx.closePath(); ctx.fill();
  });

  ctx.fillStyle = '#334455';
  ctx.font = '5px "Press Start 2P", monospace';
  ctx.fillText(isMobile ? 'UP/DN:LETTER  LT/RT:MOVE  TAP:NEXT' : 'UP/DN:LETTER  LT/RT:MOVE  ENTER:OK', cx, CH - 24);
  ctx.restore();
}

function render() {
  ctx.save();
  ctx.fillStyle = '#02020e';
  ctx.fillRect(0, 0, CW, CH);

  if (screenShake > 0.4) {
    ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    screenShake *= 0.72;
  } else {
    screenShake = 0;
  }

  drawStars();
  drawPowerups();
  drawEnemies();
  drawBullets();
  drawPlayer();
  drawParticles();
  drawStatusOverlay();

  if (gameState === 'highscore') drawLeaderboard();
  if (gameState === 'nameentry') drawNameEntry();

  ctx.restore();
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
let lastTime = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = ts - lastTime;
  if (dt < 14) return;
  lastTime = ts;

  updateStars();

  if (gameState === 'playing') {
    applyInput();
    if (player.alive) fireStep();
    updateTimers();
    updateBullets();
    updateEnemies();
    updatePowerups();
    particles = particles.filter(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.93; p.vy *= 0.93;
      return --p.life > 0;
    });
    checkCollisions();
  }

  render();
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
document.fonts.ready.then(() => {
  try {
    resizeCanvas();
    initStars();
    gameState = 'highscore';
    updateHUD();
    requestAnimationFrame(loop);
  } catch(e) { logError('BOOT: ' + e.message); }
}).catch(e => logError('FONTS: ' + e.message));
</script>
